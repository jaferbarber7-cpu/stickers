<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Oportunidad - Rifa</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  text-align:center;
  padding:30px;
}

header h1{
  margin:0;
  font-size:26px;
}

header p{
  margin-top:10px;
  color:#ccc;
}

.info{
  text-align:center;
  padding:15px;
  background:white;
  margin:15px;
  border-radius:10px;
}

.numeros{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:8px;
  padding:20px;
}

.numero{
  background:#28a745;
  color:white;
  padding:12px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
}

.btn{
  display:block;
  margin-top:5px;
  font-size:10px;
  padding:4px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:white;
  color:black;
}
</style>
</head>

<body>

<header>
<h1>🔥 GRAN OPORTUNIDAD 🔥</h1>
<p>Dos Motos Eco Deluxe 2026</p>
</header>

<div class="info">
<p>Selecciona tu número y paga por Nequi o consulta por WhatsApp</p>
<p><strong>Nequi: 3013345472</strong></p>
</div>

<div class="numeros" id="numeros"></div>

<script>
const whatsapp = "573013345472";
const contenedor = document.getElementById("numeros");

// generar números
for(let i=0;i<=999;i++){

  let numero = i.toString().padStart(3,"0");

  let div = document.createElement("div");
  div.className = "numero";

  div.innerHTML = `
    ${numero}
    <button class="btn">Comprar</button>
  `;

  div.querySelector("button").addEventListener("click", ()=>{

    const mensaje = `Hola, quiero comprar el número ${numero} de la rifa. Deseo pagar por Nequi (3013345472).`;

    window.location.href =
      `https://wa.me/${whatsapp}?text=${encodeURIComponent(mensaje)}`;
  });

  contenedor.appendChild(div);
}
</script>

</body>
</html>
