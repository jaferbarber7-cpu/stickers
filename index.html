<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dos Motos Eco Deluxe 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f4f4}
header{background:#111;color:white;padding:30px;text-align:center}

.info{background:white;max-width:1100px;margin:20px auto;padding:20px;border-radius:10px;text-align:center}

.numeros{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
gap:8px;
max-width:1200px;
margin:auto;
padding:20px;
}

.numero{
padding:12px;
border-radius:8px;
text-align:center;
color:white;
font-weight:bold;
cursor:pointer;
position:relative;
}

.disponible{background:#28a745}
.vendido{background:#dc3545;cursor:not-allowed}

.btn{
margin-top:5px;
display:block;
font-size:10px;
background:white;
color:black;
border:none;
padding:3px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>🏍️ Dos Motos Eco Deluxe 2026 🏍️</h1>
<p>Selecciona tu número</p>
</header>

<div class="info">
<p>Haz clic en “Comprar” y te llevará a WhatsApp</p>
</div>

<div class="numeros" id="numeros"></div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// 🔥 TU CONFIG (REEMPLAZA ESTO)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// WhatsApp
const whatsapp = "573013345472";

const contenedor = document.getElementById("numeros");

// crear números
for(let i=0;i<=999;i++){

  let numero = i.toString().padStart(3,"0");

  let div = document.createElement("div");
  div.className = "numero disponible";

  div.innerHTML = `
    ${numero}
    <button class="btn">Comprar</button>
  `;

  const ref = doc(db, "numeros", numero);

  // verificar si está vendido
  getDoc(ref).then((snap)=>{
    if(snap.exists()){
      div.className = "numero vendido";
      div.innerHTML = `${numero}<br>VENDIDO`;
    }
  });

  // comprar
  div.querySelector("button").onclick = async (e)=>{
    e.stopPropagation();

    const snap = await getDoc(ref);

    if(!snap.exists()){

      // guardar en Firebase (bloquear)
      await setDoc(ref,{
        estado:"vendido"
      });

      div.className = "numero vendido";
      div.innerHTML = `${numero}<br>VENDIDO`;

      // WhatsApp
      const mensaje = `Hola, quiero comprar el número ${numero} de la rifa.`;
      window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(mensaje)}`,"_blank");
    }
  };

  contenedor.appendChild(div);
}

</script>

</body>
</html>
