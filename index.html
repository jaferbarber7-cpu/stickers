<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Oportunidad - Rifa</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  text-align:center;
  padding:30px;
}

header h1{
  margin:0;
  font-size:26px;
}

.info{
  text-align:center;
  padding:15px;
  background:white;
  margin:15px;
  border-radius:10px;
}

.numeros{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:8px;
  padding:20px;
}

.numero{
  background:#28a745;
  color:white;
  padding:12px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
}

.vendido{
  background:#dc3545;
}

.btn{
  display:block;
  margin-top:5px;
  font-size:10px;
  padding:4px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:white;
  color:black;
}
</style>
</head>

<body>

<header>
<h1>🔥 GRAN OPORTUNIDAD 🔥</h1>
<p>Dos Motos Eco Deluxe 2026</p>
</header>

<div class="info">
<p><strong>Nequi: 3013345472</strong></p>
<p>Selecciona un número y compra por WhatsApp</p>
</div>

<div class="numeros" id="numeros"></div>

<script type="module">

// 🔥 FIREBASE REALTIME DATABASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// 🔥 TU CONFIG
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// WhatsApp
const whatsapp = "573013345472";

const contenedor = document.getElementById("numeros");

// crear números
for(let i=0;i<=999;i++){

  let numero = i.toString().padStart(3,"0");

  let div = document.createElement("div");
  div.className = "numero";

  div.innerHTML = `
    ${numero}
    <button class="btn">Comprar</button>
  `;

  const numRef = ref(db, "numeros/" + numero);

  // 🔴 ESCUCHAR EN TIEMPO REAL
  onValue(numRef, (snapshot) => {
    if(snapshot.exists()){
      div.classList.add("vendido");
      div.innerHTML = `${numero}<br>VENDIDO`;
    }
  });

  // 🟢 COMPRAR
  div.querySelector("button").addEventListener("click", ()=>{

    const mensaje = `Hola, quiero comprar el número ${numero} de la rifa. Pago por Nequi: 3013345472`;

    // guardar vendido en Firebase
    set(numRef, {
      estado: "vendido"
    });

    // abrir WhatsApp
    window.location.href =
      `https://wa.me/${whatsapp}?text=${encodeURIComponent(mensaje)}`;

  });

  contenedor.appendChild(div);
}

</script>

</body>
</html>
